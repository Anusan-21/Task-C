name: Task C - Automated Security Scan (Semgrep)

on: [push]

jobs:
  semgrep-scan:
    runs-on: ubuntu-latest

    permissions:
      contents: read
      security-events: write

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Install Semgrep
        run: pip install semgrep

      - name: Run Semgrep Scan
        run: |
          # Changed --json to --text and the output file to .txt
          semgrep --config=auto --text -o scan-results.txt webapp/
        continue-on-error: true

      - name: Upload Scan Results
        uses: actions/upload-artifact@v4
        with:
          name: semgrep-report
          path: scan-results.txt